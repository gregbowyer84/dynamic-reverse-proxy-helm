nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

replicaCount: 1

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  https:
    enabled: false
    port: 443

config:
  mapName: ""

proxy:
  resolver: kube-dns.kube-system.svc.cluster.local
  scheme: https
  sslVerify: "off"

logging:
  verbose: false
  includeRequestBody: false
  redactHeaders: false
  redactBody: false
  errorLevel: warn
  dynamicHeaders: true   # enables njs-based dynamic request header logging; requires nginx image with ngx_http_js_module (included in nginx:latest)

tls:
  enabled: false
  secretName: ""
  mountPath: /etc/nginx/tls
  certFile: tls.crt
  keyFile: tls.key
