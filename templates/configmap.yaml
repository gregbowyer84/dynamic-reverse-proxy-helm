apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ default (printf "%s-config" (include "nginx-proxy.fullname" .)) .Values.config.mapName }}
  namespace: {{ include "nginx-proxy.namespace" . }}
  labels:
    {{- include "nginx-proxy.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      resolver {{ .Values.proxy.resolver }} valid=10s;
      server {
        listen 80;
        {{- if .Values.tls.enabled }}
        listen 443 ssl;
        ssl_certificate {{ .Values.tls.mountPath }}/{{ .Values.tls.certFile }};
        ssl_certificate_key {{ .Values.tls.mountPath }}/{{ .Values.tls.keyFile }};
        {{- end }}

        # Dynamic proxy: /<host>[/<path>] -> <scheme>://<host>/<path>
        location ~ ^/(?<target_host>[^/]+)(?:/.*)?$ {
          rewrite ^/[^/]+/?(.*)$ /$1 break;
          proxy_pass {{ .Values.proxy.scheme }}://$target_host;
          proxy_set_header Host $target_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_ssl_verify {{ .Values.proxy.sslVerify }};
        }
      }
    }
