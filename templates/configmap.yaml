apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ default (printf "%s-config" (include "nginx-proxy.fullname" .)) .Values.config.mapName }}
  namespace: {{ include "nginx-proxy.namespace" . }}
  labels:
    {{- include "nginx-proxy.labels" . | nindent 4 }}
data:
  nginx.conf: |
    events {}
    http {
      resolver {{ .Values.proxy.resolver }} valid=10s;

      map $status $status_class {
        ~^1 1xx;
        ~^2 2xx;
        ~^3 3xx;
        ~^4 4xx;
        ~^5 5xx;
        default unknown;
      }
      log_format proxy_compact escape=json
        '{"ts":"$time_iso8601","remote_addr":"$remote_addr","method":"$request_method","uri":"$uri","status":$status,"bytes_sent":$bytes_sent,"request_time":$request_time,"upstream_status":"$upstream_status","upstream_response_time":"$upstream_response_time","target_host":"$target_host","target":"{{ .Values.proxy.scheme }}://$target_host$uri$is_args$args"}';

      log_format proxy_verbose escape=json
        '{"ts":"$time_iso8601","request_id":"$request_id","request":{"line":"$request_method {{ .Values.proxy.scheme }}://$target_host$uri$is_args$args $server_protocol","method":"$request_method","url":"{{ .Values.proxy.scheme }}://$target_host$uri$is_args$args","headers":{"host":"{{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$target_host{{ end }}","x_real_ip":"{{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$remote_addr{{ end }}","x_forwarded_for":"{{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$proxy_add_x_forwarded_for{{ end }}","x_forwarded_proto":"{{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$scheme{{ end }}","x_request_id":"{{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$request_id{{ end }}"},"content_type":"$content_type","content_length":"$content_length"{{- if .Values.logging.includeRequestBody }},"body":"{{- if .Values.logging.redactBody }}[REDACTED]{{ else }}$request_body{{ end }}"{{- end }},"curl":"curl -X $request_method ''{{ .Values.proxy.scheme }}://$target_host$uri$is_args$args'' -H ''Host: {{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$target_host{{ end }}'' -H ''X-Real-IP: {{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$remote_addr{{ end }}'' -H ''X-Forwarded-For: {{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$proxy_add_x_forwarded_for{{ end }}'' -H ''X-Forwarded-Proto: {{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$scheme{{ end }}'' -H ''X-Request-ID: {{- if .Values.logging.redactHeaders }}[REDACTED]{{ else }}$request_id{{ end }}''{{- if .Values.logging.includeRequestBody }} --data-raw ''{{- if .Values.logging.redactBody }}[REDACTED]{{ else }}$request_body{{ end }}''{{- end }}"},"response":{"line":"$server_protocol $status","status":$status,"status_class":"$status_class","content_type":"$sent_http_content_type","bytes_sent":$bytes_sent,"request_time":$request_time},"upstream":{"addr":"$upstream_addr","status":"$upstream_status","response_time":"$upstream_response_time"}}';

      error_log /dev/stderr {{ .Values.logging.errorLevel }};
      {{- if .Values.logging.verbose }}
      access_log /dev/stdout proxy_verbose;
      {{- else }}
      access_log /dev/stdout proxy_compact;
      {{- end }}

      server {
        listen 80;
        {{- if .Values.tls.enabled }}
        listen 443 ssl;
        ssl_certificate {{ .Values.tls.mountPath }}/{{ .Values.tls.certFile }};
        ssl_certificate_key {{ .Values.tls.mountPath }}/{{ .Values.tls.keyFile }};
        {{- end }}

        # Dynamic proxy: /<host>[/<path>] -> <scheme>://<host>/<path>
        location ~ ^/(?<target_host>[^/]+)(?:/.*)?$ {
          rewrite ^/[^/]+/?(.*)$ /$1 break;
          proxy_pass_request_headers on;
          proxy_pass_request_body on;
          proxy_pass {{ .Values.proxy.scheme }}://$target_host;
          proxy_set_header Host $target_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header X-Request-ID $request_id;
          proxy_ssl_verify {{ .Values.proxy.sslVerify }};
        }
      }
    }
