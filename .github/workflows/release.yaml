name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Validate tag matches chart version
        shell: bash
        run: |
          CHART_VERSION="$(grep '^version:' Chart.yaml | awk '{print $2}')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "${CHART_VERSION}" != "${TAG_VERSION}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match Chart.yaml version (${CHART_VERSION})."
            exit 1
          fi

      - name: Helm lint
        run: helm lint .

      - name: Helm package
        run: helm package .

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart to GHCR
        run: |
          CHART_VERSION="$(grep '^version:' Chart.yaml | awk '{print $2}')"
          CHART_NAME="$(grep '^name:' Chart.yaml | awk '{print $2}')"
          helm push "${CHART_NAME}-${CHART_VERSION}.tgz" "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tgz"
          generate_release_notes: true
