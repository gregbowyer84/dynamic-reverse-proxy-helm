name: Testing

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  install-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup KinD
        uses: helm/kind-action@v1

      - name: Create namespace
        run: kubectl create namespace proxy-test

      - name: Install chart
        run: |
          helm upgrade --install dynamic-reverse-proxy . \
            --namespace proxy-test \
            --set nameOverride=proxy \
            --set namespaceOverride=proxy-test \
            --wait \
            --timeout 120s

      - name: Verify deployment rollout
        run: kubectl rollout status deployment/dynamic-reverse-proxy -n proxy-test --timeout=120s

      - name: Verify service exists
        run: kubectl get service dynamic-reverse-proxy -n proxy-test
